name: Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Muskometer. Please include as much detail as you can.

  - type: input
    id: macos_version
    attributes:
      label: macOS version
      description: e.g. macOS 15.4 (24E248) — find in **System Settings → General → About**
      placeholder: macOS 15.4
    validations:
      required: true

  - type: input
    id: muskometer_version
    attributes:
      label: Muskometer version
      description: From **Muskometer → Settings** or the release tag you installed
      placeholder: 0.1.2
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do before the bug appeared?
      placeholder: |
        1. Open Muskometer from the menu bar
        2. Click Refresh
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshots
      description: Drag and drop images here, or paste a screenshot. Menu bar and popover shots are especially helpful.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, Console.app excerpts, or anything else that might help
    validations:
      required: false