name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run verify script
        env:
          # Skip live Yahoo to avoid flaky external network in CI.
          # Local: scripts/verify.sh runs Yahoo by default; set MUSKOMETER_SKIP_LIVE_YAHOO=1 to skip.
          MUSKOMETER_SKIP_LIVE_YAHOO: "1"
        run: ./scripts/verify.sh