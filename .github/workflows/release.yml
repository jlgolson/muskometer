# Build and publish an unsigned Muskometer release when a version tag is pushed.
#
# No Apple Developer Program secrets required. Recipients must right-click → Open
# on first launch (Gatekeeper). See docs/INSTALL.md.
#
# For signed + notarized releases, maintainers with a Developer ID certificate
# can use scripts/release.sh locally — see docs/RELEASE.md.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify (tests + release build)
        env:
          # Skip live Yahoo to avoid flaky external network in CI.
          MUSKOMETER_SKIP_LIVE_YAHOO: "1"
        run: ./scripts/verify.sh

      - name: Package DMG and zip
        run: ./scripts/package-dmg.sh

      - name: Write release notes with checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract only the ## [VERSION] section from CHANGELOG.md
          # (from that heading until the next ## [ heading or EOF).
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md"
          fi
          {
            echo "Muskometer ${VERSION} — unsigned macOS menu bar app."
            echo ""
            echo "First launch: right-click **Muskometer** → **Open** → **Open**."
            echo ""
            printf '%s\n' "$NOTES"
            echo ""
            echo "**Checksums (SHA-256)**"
            echo '```'
            shasum -a 256 dist/Muskometer-"${VERSION}".dmg dist/Muskometer-"${VERSION}".zip
            echo '```'
          } > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Muskometer-*.dmg
            dist/Muskometer-*.zip
          body_path: /tmp/release-notes.md
          generate_release_notes: false