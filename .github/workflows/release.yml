# Build and publish an unsigned Muskometer release when a version tag is pushed.
#
# No Apple Developer Program secrets required. Recipients must right-click → Open
# on first launch (Gatekeeper). See docs/INSTALL.md.
#
# For signed + notarized releases (no Gatekeeper prompt), maintainers with a
# Developer ID Application certificate can use scripts/release.sh locally or
# wire that script into CI with Apple secrets — see docs/RELEASE.md.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify (tests + release build)
        run: ./scripts/verify.sh

      - name: Package DMG and zip
        run: ./scripts/package-dmg.sh

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Muskometer-*.dmg
            dist/Muskometer-*.zip
          generate_release_notes: true