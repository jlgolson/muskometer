# Build and publish a signed Muskometer release when a version tag is pushed.
#
# Manual releases via ./scripts/release.sh on your Mac are often easier until
# you import your Developer ID certificate and notary API key into GitHub Secrets.
#
# Required repository secrets:
#   APPLE_TEAM_ID
#   APPLE_CERTIFICATE_BASE64      — base64 of exported .p12 (Developer ID Application + private key)
#   APPLE_CERTIFICATE_PASSWORD    — password used when exporting the .p12
#   APPLE_API_KEY_ID
#   APPLE_API_KEY_ISSUER_ID
#   APPLE_API_KEY_BASE64          — base64 of AuthKey_XXXXXXXX.p8
#
# Export cert locally:
#   security find-identity -v -p codesigning
#   # Export "Developer ID Application: …" from Keychain Access as .p12
#   base64 -i cert.p12 | pbcopy

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          missing=0
          for var in APPLE_TEAM_ID APPLE_CERTIFICATE_BASE64 APPLE_CERTIFICATE_PASSWORD \
                     APPLE_API_KEY_ID APPLE_API_KEY_ISSUER_ID APPLE_API_KEY_BASE64; do
            if [[ -z "${!var}" ]]; then
              echo "::error::Missing secret: $var"
              missing=1
            fi
          done
          if [[ "$missing" -eq 1 ]]; then
            echo "Configure secrets (see docs/RELEASE.md) or cut releases manually with scripts/release.sh"
            exit 1
          fi
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: Import signing certificate
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p actions "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p actions "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Write notarization API key
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: Build release artifacts
        run: ./scripts/release.sh
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
          generate_release_notes: true