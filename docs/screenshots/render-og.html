<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      width: 1200px;
      height: 630px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", sans-serif;
      background: radial-gradient(ellipse 90% 80% at 50% -20%, #1a2744 0%, #0d0d0f 55%);
      color: #f5f5f7;
      display: grid;
      grid-template-columns: 1fr 420px;
      align-items: center;
      padding: 48px 56px;
      gap: 40px;
    }
    .copy h1 {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .copy .tagline {
      margin-top: 12px;
      font-size: 28px;
      color: #98989d;
    }
    .copy .lede {
      margin-top: 24px;
      font-size: 22px;
      line-height: 1.45;
      color: #d1d1d6;
      max-width: 560px;
    }
    .preview img {
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 24px 64px rgba(0,0,0,0.45);
    }
  </style>
</head>
<body>
  <div class="copy">
    <h1>Muskometer</h1>
    <p class="tagline">What's Elon up to today?</p>
    <p class="lede">See what Elon Musk's shares in Tesla and SpaceX are worth — minute by minute, every day.</p>
  </div>
  <div class="preview">
    <img src="app-preview.png" alt="">
  </div>
</body>
</html>
