<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Rounded", "SF Pro Text", sans-serif;
      background: linear-gradient(160deg, #1a2744 0%, #0d0d0f 45%, #111 100%);
      padding: 48px;
      width: 920px;
      color: #f5f5f7;
    }
    .scene {
      display: grid;
      gap: 28px;
      justify-items: center;
    }
    .menubar {
      display: flex;
      align-items: center;
      gap: 24px;
      background: rgba(40, 40, 42, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
      width: 100%;
      max-width: 720px;
    }
    .menubar-left {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #98989d;
      font-size: 12px;
    }
    .menubar-icon {
      width: 14px;
      height: 14px;
      opacity: 0.75;
    }
    .menubar-gain {
      margin-left: auto;
      font-size: 13px;
      font-weight: 600;
      color: #4CE06B;
      font-variant-numeric: tabular-nums;
    }
    .popover-shot {
      width: 360px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 24px 64px rgba(0,0,0,0.45);
      display: block;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="menubar">
      <div class="menubar-left">
        <svg class="menubar-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M2 12 L5 8 L8 10 L11 4 L14 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Finder</span>
        <span>File</span>
        <span>Edit</span>
      </div>
      <div class="menubar-gain">+$4.4B</div>
    </div>

    <img
      class="popover-shot"
      src="app-capture.png"
      width="360"
      height="884"
      alt="Muskometer popover"
    >
  </div>
</body>
</html>
